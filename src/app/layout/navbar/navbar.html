<header class="sticky top-0 z-40 flex justify-between items-center w-full px-8 py-4 bg-surface">
    <!-- Search -->
    <div class="flex items-center gap-6 flex-1">
        @if (showSearch()) {
            <div class="relative w-full max-w-md">
                <svg
                    [lucideIcon]="LucideSearch"
                    class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant"
                    [size]="16"
                ></svg>
                <input
                    type="text"
                    class="w-full bg-surface-container-highest rounded-lg pl-10 pr-4 py-2 text-sm border-none focus:ring-2 focus:ring-surface-tint focus:bg-surface-container-lowest transition-all outline-none"
                    placeholder="Buscar en mis colecciones..."
                    [value]="searchQuery()"
                    (input)="searchQuery.set($any($event.target).value)"
                />
            </div>
        }
    </div>


</header>
