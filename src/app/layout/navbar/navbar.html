<header class="sticky top-0 z-40 flex justify-between items-center w-full px-8 py-4 bg-surface">
  <!-- Search -->
  <div class="flex items-center gap-6 flex-1">
    <div class="relative w-full max-w-md">
      <svg [lucideIcon]="LucideSearch" class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" [size]="16"></svg>
      <input
        type="text"
        class="w-full bg-surface-container-highest rounded-lg pl-10 pr-4 py-2 text-sm border-none focus:ring-2 focus:ring-surface-tint focus:bg-surface-container-lowest transition-all outline-none"
        placeholder="Buscar en mis colecciones..."
        [value]="searchQuery()"
        (input)="searchQuery.set($any($event.target).value)" />
    </div>
  </div>

  <!-- Actions -->
  <div class="flex items-center gap-4">
    <button
      class="p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors cursor-pointer"
      aria-label="Ayuda">
      <svg [lucideIcon]="LucideCircleHelp" [size]="20"></svg>
    </button>
    <button
      class="p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors relative cursor-pointer"
      aria-label="Notificaciones">
      <svg [lucideIcon]="LucideBell" [size]="20"></svg>
      <span class="absolute top-2 right-2 w-2 h-2 bg-tertiary-fixed-dim rounded-full"></span>
    </button>
    <div ngpAvatar class="w-8 h-8 rounded-full overflow-hidden ml-2 inline-flex items-center justify-center bg-primary-container">
      <span ngpAvatarFallback class="text-xs font-bold text-on-primary">CA</span>
    </div>
  </div>
</header>
